<!-- Botón móvil -->
<button
  type="button"
  (click)="toggleSidebar()"
  class="text-gray-600 border border-gray-200 hover:bg-gray-100 rounded p-2 ms-3 mt-3 inline-flex sm:hidden"
>
  <span class="sr-only">Open sidebar</span>
  <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <path
      stroke="currentColor"
      stroke-linecap="round"
      stroke-width="2"
      d="M5 7h14M5 12h14M5 17h10"
    />
  </svg>
</button>

<!-- Sidebar -->
<aside
  class="fixed top-0 left-0 z-40 w-64 h-full transition-transform sm:translate-x-0"
  [class.-translate-x-full]="!isOpen"
>
  <div class="h-full px-3 py-4 overflow-y-auto bg-gray-50 border-r border-gray-200">
    <ul class="space-y-2 font-medium">
      <li>
        <a
          routerLink="/admin/dashboard"
          routerLinkActive="bg-gray-100 text-blue-600"
          class="flex items-center px-2 py-2 text-gray-700 rounded hover:bg-gray-100 hover:text-blue-600 group"
        >
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 6.025A7.5 7.5 0 1 0 17.975 14H10V6.025Z"
            />
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13.5 3c-.169 0-.334.014-.5.025V11h7.975c.011-.166.025-.331.025-.5A7.5 7.5 0 0 0 13.5 3Z"
            />
          </svg>
          <span class="ms-3">Dashboard</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/admin/products"
          routerLinkActive="bg-gray-100 text-blue-600"
          class="flex items-center px-2 py-2 text-gray-700 rounded hover:bg-gray-100 hover:text-blue-600 group"
        >
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 10V6a3 3 0 0 1 3-3v0a3 3 0 0 1 3 3v4m3-2 .917 11.923A1 1 0 0 1 17.92 21H6.08a1 1 0 0 1-.997-1.077L6 8h12Z"
            />
          </svg>
          <span class="ms-3">Productos</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/admin/categories"
          routerLinkActive="bg-gray-100 text-blue-600"
          class="flex items-center px-2 py-2 text-gray-700 rounded hover:bg-gray-100 hover:text-blue-600 group"
        >
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 13h3.439a.991.991 0 0 1 .908.6 3.978 3.978 0 0 0 7.306 0 .99.99 0 0 1 .908-.6H20M4 13v6a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-6M4 13l2-9h12l2 9M9 7h6m-7 3h8"
            />
          </svg>
          <span class="ms-3">Categorías</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/admin/users"
          routerLinkActive="bg-gray-100 text-blue-600"
          class="flex items-center px-2 py-2 text-gray-700 rounded hover:bg-gray-100 hover:text-blue-600 group"
        >
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-width="2"
              d="M16 19h4a1 1 0 0 0 1-1v-1a3 3 0 0 0-3-3h-2m-2.236-4a3 3 0 1 0 0-4M3 18v-1a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1Zm8-10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            />
          </svg>
          <span class="ms-3">Usuarios</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/admin/orders"
          routerLinkActive="bg-gray-100 text-blue-600"
          class="flex items-center px-2 py-2 text-gray-700 rounded hover:bg-gray-100 hover:text-blue-600 group"
        >
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 5v14M9 5v14M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z"
            />
          </svg>
          <span class="ms-3">Pedidos</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/"
          class="flex items-center px-2 py-2 text-red-700 rounded hover:bg-gray-100 hover:text-blue-600 group"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"
            />
          </svg>

          <span class="ms-3">Volver a la tienda</span>
        </a>
      </li>
    </ul>
  </div>
</aside>

@if (isOpen) {
  <div class="fixed inset-0 z-30 bg-black/50 sm:hidden" (click)="toggleSidebar()"></div>
}
