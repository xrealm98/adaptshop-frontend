<app-table-header placeholder="Buscar usuario..." (onSearch)="onSearch($event)" />

<div class="overflow-x-auto shadow-md rounded-lg border border-gray-200">
  <table class="table">
    <thead class="table__thead">
      <tr>
        <th class="table__th">Nombre</th>
        <th class="table__th">Email</th>
        <th class="table__th">Rol</th>
        <th class="table__th">Estado</th>
        <th class="table__th table__th--center">Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (user of filteredUsers(); track user.id) {
        <tr class="bg-white border-b border-gray-200 hover:bg-blue-50 transition-colors">
          <td class="px-6 py-4 border-r border-gray-200 font-semibold text-gray-900">
            {{ user.first_name }} {{ user.last_name }}
          </td>
          <td class="table__td">{{ user.email }}</td>
          <td class="table__td">
            @if (user.role === 'admin') {
              <span class="px-2 py-1 text-xs font-medium bg-purple-100 text-purple-700 rounded-full"
                >Admin</span
              >
            } @else {
              <span class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-700 rounded-full"
                >Cliente</span
              >
            }
          </td>
          <td class="table__td">
            @if (user.is_blocked) {
              <span class="px-2 py-1 text-xs font-medium bg-red-100 text-red-700 rounded-full"
                >Bloqueado</span
              >
            } @else {
              <span class="px-2 py-1 text-xs font-medium bg-green-100 text-green-700 rounded-full"
                >Activo</span
              >
            }
          </td>
          <td class="px-6 py-4 flex justify-center gap-4">
            <button
              (click)="toggleBlock(user)"
              class="table__button--block"
              [class]="
                user.is_blocked
                  ? 'text-green-600 bg-green-50 hover:bg-green-600 hover:text-white'
                  : 'text-red-600 bg-red-50 hover:bg-red-600 hover:text-white'
              "
              [title]="user.is_blocked ? 'Desbloquear usuario' : 'Bloquear usuario'"
            >
              @if (user.is_blocked) {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M13.5 10.5V6.75a4.5 4.5 0 1 1 9 0v3.75M3.75 21.75h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H3.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"
                  />
                </svg>
              } @else {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"
                  />
                </svg>
              }
            </button>
            <button
              [routerLink]="['/admin/users/edit', user.id]"
              class="table__button--edit"
              title="Editar usuario"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125"
                />
              </svg>
            </button>
            <button
              (click)="deleteUser(user.id!)"
              class="table__button--delete"
              title="Eliminar usuario"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                />
              </svg>
            </button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" class="text-center py-10 text-gray-400 bg-gray-50">
            No hay usuarios disponibles.
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
