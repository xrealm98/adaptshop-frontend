<div class="max-w-5xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-8">Pago</h1>

  <form [formGroup]="form" (ngSubmit)="onPay()" class="grid md:grid-cols-2 gap-12">
    <div class="space-y-4">
      <h2 class="text-xl font-semibold">Datos de envío</h2>

      <div>
        <label class="block text-sm font-medium text-gray-700">Nombre</label>
        <input formControlName="first_name" class="form__input" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Apellidos</label>
        <input formControlName="last_name" class="form__input" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Correo electrónico</label>
        <input
          formControlName="email"
          class="form__input form__input bg-gray-100 cursor-not-allowed"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Dirección</label>
        <input formControlName="shipping_street" class="form__input" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Ciudad</label>
          <input formControlName="shipping_city" class="form__input" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Provincia</label>
          <input formControlName="shipping_province" class="form__input" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Código Postal</label>
          <input formControlName="shipping_postal_code" class="form__input" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">País</label>
          <input formControlName="shipping_country" class="form__input" />
        </div>
      </div>

      <div class="mt-4">
        <label class="flex items-center cursor-pointer">
          <input
            type="checkbox"
            formControlName="save_data"
            class="w-5 h-5 accent-black rounded border-gray-300"
          />
          <span class="ml-3 text-sm text-gray-700">¿Deseas guardar los datos en tu perfil?</span>
        </label>
      </div>

      <h2 class="text-xl font-semibold mt-6">Método de pago</h2>
      <div class="space-y-3 mt-4">
        <label
          class="flex items-center justify-between p-4 border rounded cursor-pointer hover:bg-gray-50"
        >
          <span class="font-medium">Tarjeta de crédito/débito</span>
          <input type="radio" checked class="w-5 h-5 accent-black" />
        </label>
      </div>

      <div id="card-element" class="p-4 mt-4 border rounded bg-white shadow-sm"></div>
    </div>

    <div class="flex flex-col">
      <div class="border p-6 rounded-lg">
        <h2 class="text-xl font-semibold mb-4">Resumen del pedido</h2>
        @for (item of cartService.cartItems(); track item.id) {
          <div class="flex justify-between mb-2">
            <span>{{ item.quantity }} x {{ item.name }}</span>
            <span>{{ item.price | currency: 'EUR' }}</span>
          </div>
        }
        <div class="text-right text-lg font-bold mt-4 pt-4 border-t">
          Total: {{ cartService.totalPrice() | currency: 'EUR' }}
        </div>
      </div>
    </div>
    <button
      type="submit"
      [disabled]="form.invalid"
      class="w-full mt-6 p-3 bg-green-600 text-white rounded font-bold cursor-pointer hover:bg-green-700"
    >
      PAGAR
    </button>
    <button
      type="button"
      (click)="goBack()"
      class="w-full mt-6 p-3 bg-gray-200 text-gray-800 rounded font-bold cursor-pointer hover:bg-gray-300"
    >
      Volver a la tienda
    </button>
  </form>
</div>
