<section class="py-8">
  <h2 class="text-2xl font-black text-gray-800 mb-6 uppercase tracking-tight">
    Categorías que te pueden gustar
  </h2>

  <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
    @for (cat of categories; track cat.id) {
      <button
        (click)="navigateToCategory(cat.id)"
        class="flex items-center gap-4 p-4 rounded-xl border {{ cat.borderColor }} {{
          cat.bgColor
        }} 
               hover:shadow-md transition-all duration-300 group cursor-pointer active:scale-95"
      >
        <div
          class="size-12 rounded-lg bg-white flex items-center justify-center text-2xl shadow-sm group-hover:rotate-6 transition-transform"
        >
          {{ cat.icon }}
        </div>

        <span class="font-bold text-lg {{ cat.textColor }} tracking-tight">
          {{ cat.name }}
        </span>
      </button>
    }
  </div>
</section>
