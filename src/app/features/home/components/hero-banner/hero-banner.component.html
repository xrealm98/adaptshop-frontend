<section class="relative w-full overflow-hidden mt-6">
  <swiper-container #swiperRef init="false" class="h-100 md:h-125 lg:h-150 w-full">
    @for (banner of banners; track banner.title) {
      <swiper-slide>
        <div class="relative w-full h-full flex items-center">
          <div class="absolute inset-0">
            <img [src]="banner.image" class="w-full h-full object-cover" [alt]="banner.title" />
            <div class="absolute inset-0 bg-linear-to-r from-black/70 to-transparent"></div>
          </div>

          <div class="container mx-auto px-6 md:px-12 relative z-10 text-white max-w-3xl">
            <span
              class="inline-block px-4 py-1 mb-4 rounded-full bg-green-500 text-xs font-bold uppercase tracking-widest"
            >
              Promoción Exclusiva
            </span>
            <h2 class="text-4xl md:text-6xl font-black mb-4 leading-tight">
              {{ banner.title }}
            </h2>
            <p class="text-lg md:text-xl mb-8 opacity-90 font-medium">
              {{ banner.subtitle }}
            </p>
            <button
              class="px-8 py-4 bg-white text-black font-bold rounded-xl hover:bg-green-500 hover:text-white transition-all transform active:scale-95 shadow-xl"
            >
              {{ banner.buttonText }}
            </button>
          </div>
        </div>
      </swiper-slide>
    }
  </swiper-container>
</section>
