<section class="py-8">
  <h2 class="text-2xl font-black text-gray-800 mb-6 uppercase tracking-tight px-4">
    {{ title }}
  </h2>

  <swiper-container
    #swiperRef
    init="true"
    slides-per-view="auto"
    space-between="24"
    navigation="true"
    pagination="false"
    grab-cursor="true"
    class="pb-10"
  >
    @for (product of products; track product.id) {
      <swiper-slide class="w-[65vw] sm:w-[320px] md:w-81.25 pb-4">
        <app-product-card [product]="product" />
      </swiper-slide>
    } @empty {
      <div
        class="w-full py-10 text-center bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200"
      >
        <p class="text-gray-400 font-medium">No hay productos en esta sección.</p>
      </div>
    }
  </swiper-container>
</section>
