<header class="bg-[#797676]">
  <div class="flex place-content-around py-6">
    <a routerLink="/" class="text-4xl font-bold text-gray-800 cursor-pointer">AdaptShop</a>
    <div class="hidden md:flex flex-grow max-w-2xl relative">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          ></path>
        </svg>
      </div>
      <input
        type="search"
        placeholder="Busca un producto"
        class="w-full h-12 pl-12 pr-4 bg-white rounded-full border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-200 focus:outline-none text-gray-800 shadow-inner"
      />
    </div>
    <div>
      @if (authService.isAuthenticated()) {
        <button
          (click)="logout()"
          class="text-sm font-semibold text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg transition cursor-pointer"
        >
          Cerrar sesión
        </button>
      } @else {
        <button
          routerLink="/login"
          class="px-5 py-2.5 rounded-lg font-semibold text-black-800 hover:bg-gray-100 transition cursor-pointer"
        >
          Iniciar sesión
        </button>
        <button
          routerLink="/register"
          class="px-5 py-2.5 rounded-lg font-semibold bg-blue-600 text-white hover:bg-blue-700 shadow-md shadow-blue-200 transition cursor-pointer"
        >
          Registro
        </button>
      }
    </div>
    <button class="relative group p-2 transition-transform hover:scale-110 cursor-pointer">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-10"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
        />
      </svg>

      <span
        class="absolute bottom-0 left-0 flex h-5 w-5 items-center justify-center rounded-full bg-blue-600 text-[10px] font-bold text-white shadow-sm"
      >
        0
      </span>
    </button>
  </div>
  <nav class="hidden md:flex items-center font-medium text-black-600 bg-[#DDD1D1] pl-24">
    <a routerLink="/" class="header_link">Inicio</a>
    <a routerLink="/productos" class="header_link">Tienda</a>
    <a routerLink="/contacto" class="header_link">Contacto</a>
  </nav>
</header>
